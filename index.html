<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منار | نسخه ۱.۶.۳</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff; --text: #1a202c; --gold: #d4af37; --gold-light: #fdfae9;
            --gray-light: #f7fafc; --overlay-bg: rgba(0, 0, 0, 0.6);
            --card-bg: #ffffff; --nav-bg: #1a202c; --popup-title: #1e293b;
        }

        body.dark-mode {
            --bg: #121212; --text: #e2e8f0; --gold-light: #2d2d2a;
            --gray-light: #1e1e1e; --card-bg: #1e1e1e; --nav-bg: #000000;
            --popup-title: #f1f5f9;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Vazirmatn', sans-serif; margin: 0; padding-bottom: 100px; transition: 0.3s; }

        .theme-switch {
            position: fixed; top: 25px; left: 20px; width: 34px; height: 34px;
            background: var(--gray-light); border-radius: 8px; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            z-index: 1100; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .theme-icon { width: 16px; height: 16px; }

        header { width: 100%; padding: 35px 20px 25px; text-align: center; }
        .logo { font-family: 'Rubik', sans-serif; font-weight: 500; font-size: 2.8rem; margin: 0; color: var(--text); }
        .subtitle { font-size: 0.85rem; color: #718096; margin-top: 5px; opacity: 0.8; }

        /* ظریف‌سازی نهایی کادر موضوعات */
        .topics-container { 
            width: 78%; 
            max-width: 400px; 
            margin: 0 auto; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .topic-row {
            display: flex; 
            align-items: center; 
            background: var(--gray-light); 
            padding: 8px 12px; 
            border-radius: 18px;
            cursor: pointer; 
            transition: 0.3s;
        }
        .topic-row:hover { transform: scale(1.02); background: var(--card-bg); border: 1px solid var(--gold); }
        
        .icon-wrapper { 
            width: 42px; 
            height: 42px; 
            border-radius: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.3rem; 
            background: var(--card-bg); 
            flex-shrink: 0; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }
        .topic-info { margin-right: 12px; flex-grow: 1; }
        .topic-info h3 { font-family: 'Rubik', sans-serif; font-weight: 500; font-size: 1.1rem; margin: 0; }

        .full-overlay {
            position: fixed; top: 50%; left: 50%; width: 88%; max-width: 450px; 
            background: var(--card-bg); border-radius: 35px; z-index: 2000;
            padding: 40px 30px; text-align: center; border: 1px solid var(--gold-light);
            display: none; opacity: 0; transform: translate(-50%, -50%) scale(0.95); transition: 0.4s;
        }
        .full-overlay.open { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .blur-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay-bg); backdrop-filter: blur(6px); display: none; z-index: 1500; }
        .blur-bg.show { display: block; }
        
        .popup-title { font-family: 'Rubik', sans-serif; font-weight: 700; color: var(--popup-title); font-size: 1.6rem; margin: 0; }
        .action-btn { background: var(--text); color: var(--bg); border: none; padding: 12px 25px; border-radius: 14px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 18px; font-family: 'Vazirmatn'; }
        
        .bottom-nav {
            position: fixed; bottom: 20px; width: 85%; max-width: 400px; 
            background: var(--nav-bg); left: 50%; transform: translateX(-50%); 
            padding: 12px; border-radius: 30px; display: flex; 
            justify-content: space-around; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .nav-item { color: #fff; text-decoration: none; font-size: 0.75rem; text-align: center; opacity: 0.5; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--gold); }
        .nav-svg { width: 20px; height: 20px; margin-bottom: 4px; fill: none; stroke: currentColor; stroke-width: 2; }
    </style>
</head>
<body id="body">

    <div class="theme-switch" onclick="toggleTheme()">
        <svg id="themeIcon" class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </div>

    <header>
        <h1 class="logo">مَنار</h1>
        <div class="subtitle">دانشنامه تاریخ اسلام</div>
    </header>

    <main class="topics-container">
        <div class="topic-row" style="border-right:5px solid #48bb78" onclick="openTopic('sirah')"><div class="icon-wrapper">🌙</div><div class="topic-info"><h3>سیره نبوی</h3></div></div>
        <div class="topic-row" style="border-right:5px solid #ed8936" onclick="openTopic('khalifa')"><div class="icon-wrapper">🛡️</div><div class="topic-info"><h3>خلفای راشدین</h3></div></div>
        <div class="topic-row" style="border-right:5px solid #4299e1" onclick="openTopic('fiqh')"><div class="icon-wrapper">📜</div><div class="topic-info"><h3>احکام و فقه</h3></div></div>
        <div class="topic-row" style="border-right:5px solid #9f7aea" onclick="openTopic('hadith')"><div class="icon-wrapper">✍️</div><div class="topic-info"><h3>بزرگان حدیث</h3></div></div>
        <div class="topic-row" style="border-right:5px solid #f56565" onclick="openTopic('history')"><div class="icon-wrapper">🌍</div><div class="topic-info"><h3>فتوحات بزرگ</h3></div></div>
        <div class="topic-row" style="border-right:5px solid #ecc94b" onclick="openTopic('ethics')"><div class="icon-wrapper">💎</div><div class="topic-info"><h3>اخلاق اسلامی</h3></div></div>
    </main>

    <div class="blur-bg" id="blurBg" onclick="closeAll()"></div>

    <div class="full-overlay" id="topicOverlay">
        <div id="topicIcon" style="font-size: 3rem; margin-bottom: 10px;"></div>
        <h2 id="topicTitle" class="popup-title" style="color:var(--gold)"></h2>
        <p id="topicDesc" style="line-height: 1.8; color: var(--text); margin-top: 15px; font-size: 0.95rem; text-align: justify;"></p>
        <button class="action-btn">ورود به بخش بازی ➔</button>
        <p onclick="closeAll()" style="cursor:pointer; margin-top:15px; color:#a0aec0; font-size: 0.9rem;">بستن</p>
    </div>

    <nav class="bottom-nav">
        <a class="nav-item active"><svg class="nav-svg"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>خانه</a>
        <a class="nav-item" onclick="openOverlay('topicOverlay')"><svg class="nav-svg"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>ذکر</a>
        <a class="nav-item"><svg class="nav-svg"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>جستجو</a>
        <a class="nav-item"><svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle></svg>من</a>
    </nav>

    <script>
        const topicData = {
            sirah: {t: "سیره نبوی", i: "🌙", d: "سفری به زندگی گهربار پیامبر اکرم صلی الله علیه و آله وسلم از ولادت تا رحلت."},
            khalifa: {t: "خلفای راشدین", i: "🛡️", d: "آشنایی با دوران حکومت ابوبکر، عمر، عثمان و علی رضی الله عنهم."},
            fiqh: {t: "احکام و فقه", i: "📜", d: "یادگیری مسائل شرعی و احکام زندگی روزمره بر اساس فقه اسلامی."},
            hadith: {t: "بزرگان حدیث", i: "✍️", d: "آشنایی با راویان بزرگ و کتاب‌های معتبر حدیثی."},
            history: {t: "فتوحات بزرگ", i: "🌍", d: "مروری بر تاریخ فتوحات و گسترش اسلام در جهان."},
            ethics: {t: "اخلاق اسلامی", i: "💎", d: "آموزه‌های اخلاقی و فضائل انسانی در دین مبین اسلام."}
        };

        function openTopic(id) {
            const data = topicData[id];
            document.getElementById('topicTitle').innerText = data.t;
            document.getElementById('topicIcon').innerText = data.i;
            document.getElementById('topicDesc').innerText = data.d;
            openOverlay('topicOverlay');
        }

        function toggleTheme() {
            const body = document.getElementById('body');
            body.classList.toggle('dark-mode');
            const icon = document.getElementById('themeIcon');
            if(body.classList.contains('dark-mode')) {
                icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />';
            } else {
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
            }
        }

        function openOverlay(id) {
            document.getElementById(id).style.display = 'block';
            setTimeout(() => { document.getElementById(id).classList.add('open'); }, 10);
            document.getElementById('blurBg').classList.add('show');
        }

        function closeAll() {
            document.querySelectorAll('.full-overlay').forEach(el => el.classList.remove('open'));
            setTimeout(() => { document.querySelectorAll('.full-overlay').forEach(el => el.style.display = 'none'); }, 300);
            document.getElementById('blurBg').classList.remove('show');
        }
    </script>
</body>
</html>
