<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>اسلام کوییز | نسخه اصلاح آیکون</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700;800&family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --bg: #0d1117;
            --card-text: #ffffff;
            --card-sub: #cbd5e1;
            --accent: #ffcf4b; 
            --btn-text: #000000;
            --glass-bg: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(255, 255, 255, 0.15);
            --font-title: 'Rubik', sans-serif;
            --font-body: 'Vazirmatn', sans-serif;
        }

        body.light {
            --bg: #f1f5f9;
            --card-text: #1e293b;
            --card-sub: #475569;
            --accent: #4f46e5; 
            --btn-text: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; transition: 0.4s; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: var(--bg); color: var(--card-text);
            font-family: var(--font-body);
        }

        body { display: flex; flex-direction: column; }

        /* استایل اختصاصی برای اطمینان از نمایش آیکون‌ها */
        .material-symbols-outlined {
            font-display: block;
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
            display: inline-block;
            vertical-align: middle;
        }

        .top-actions {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            display: flex; gap: 12px;
        }

        .action-btn {
            width: 48px; height: 48px; border-radius: 16px;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: var(--accent); cursor: pointer; display: flex;
            align-items: center; justify-content: center; backdrop-filter: blur(12px);
            text-decoration: none;
        }

        .header { padding: 50px 20px 0; text-align: center; flex-shrink: 0; z-index: 10; }
        .header h1 { font-family: var(--font-title); font-size: 28px; margin: 0; }
        .header p { font-size: 13px; color: var(--card-sub); margin-top: 6px; }

        .swiper-container { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; }
        .swiper { width: 310px; height: 450px; perspective: 1200px; }

        .swiper-slide {
            border-radius: 40px; position: relative; overflow: hidden;
            border: 1px solid var(--glass-border); background: #1e293b;
            backface-visibility: hidden;
        }

        .slide-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--glass-bg); backdrop-filter: blur(15px); z-index: 2;
        }

        .slide-content {
            position: relative; z-index: 3; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 35px 25px; text-align: center;
        }

        .slide-icon { font-size: 80px; color: var(--accent); margin-bottom: 15px; }

        .play-btn {
            background: var(--accent); color: var(--btn-text);
            padding: 12px 28px; border-radius: 16px; font-family: var(--font-title);
            font-size: 14px; display: flex; align-items: center; gap: 8px;
            font-weight: 800; text-decoration: none;
        }

        /* Popups */
        .popup-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; z-index: 2000;
            justify-content: center; align-items: center; backdrop-filter: blur(20px);
        }
        .popup-content {
            background: var(--glass-bg); width: 85%; max-width: 380px;
            padding: 40px; border-radius: 40px; text-align: center;
            border: 1px solid var(--glass-border);
        }

        .social-box { display: flex; justify-content: center; gap: 15px; margin: 25px 0; }
        .social-box a {
            width: 50px; height: 50px; border-radius: 14px;
            background: var(--bg); display: flex; align-items: center;
            justify-content: center; font-size: 22px; color: var(--card-sub);
            text-decoration: none; border: 1px solid var(--glass-border);
        }

        .footer-nav {
            height: 85px; background: var(--glass-bg); border-top: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom); backdrop-filter: blur(25px); z-index: 10;
        }
        .nav-link {
            display: flex; flex-direction: column; align-items: center;
            font-size: 11px; color: var(--card-sub); cursor: pointer;
        }
        .nav-link .material-symbols-outlined { font-size: 32px; color: var(--card-text); margin-bottom: 5px; }
    </style>
</head>
<body id="body">

<div class="top-actions">
    <a href="index.html" class="action-btn">
        <span class="material-symbols-outlined">home</span>
    </a>
    <button class="action-btn" onclick="toggleTheme()">
        <span id="theme-icon" class="material-symbols-outlined">dark_mode</span>
    </button>
</div>

<div class="header">
    <h1>اسلام کوییز</h1>
    <p>۹ مرحله چالش‌برانگیز | UI Studio</p>
</div>

<div class="swiper-container">
    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <div class="slide-overlay"></div>
                <div class="slide-content">
                    <span class="material-symbols-outlined slide-icon">menu_book</span>
                    <div class="slide-title">قرآن کریم</div>
                    <p class="slide-desc">مفاهیم آیات الهی</p>
                    <a href="quran.html" class="play-btn">مرحله ۱</a>
                </div>
            </div>
            <div class="swiper-slide">
                <div class="slide-overlay"></div>
                <div class="slide-content">
                    <span class="material-symbols-outlined slide-icon">history_edu</span>
                    <div class="slide-title">سیره نبوی</div>
                    <p class="slide-desc">زندگی پیامبر ﷺ</p>
                    <a href="seerah.html" class="play-btn">مرحله ۲</a>
                </div>
            </div>
            <div class="swiper-slide">
                <div class="slide-overlay"></div>
                <div class="slide-content">
                    <span class="material-symbols-outlined slide-icon">mosque</span>
                    <div class="slide-title">فقه</div>
                    <p class="slide-desc">احکام شرعی</p>
                    <a href="fiqh.html" class="play-btn">مرحله ۳</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="popup-overlay" id="popupAbout">
    <div class="popup-content">
        <h2>درباره ما</h2>
        <p>نشر معارف اسلامی توسط تیم UI Studio.</p>
        <div class="social-box">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
        </div>
        <button class="play-btn" style="margin: 0 auto;" onclick="togglePopup('popupAbout', false)">بستن</button>
    </div>
</div>

<div class="footer-nav">
    <div class="nav-link" onclick="togglePopup('popupAbout', true)">
        <span class="material-symbols-outlined">info</span>درباره ما
    </div>
    <div class="nav-link">
        <span class="material-symbols-outlined">emoji_events</span>برترین‌ها
    </div>
    <div class="nav-link" onclick="togglePopup('popupAbout', true)">
        <span class="material-symbols-outlined">share</span>اشتراک
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const swiper = new Swiper(".mySwiper", {
        effect: "flip",
        grabCursor: true,
        loop: true,
        speed: 800,
        touchEventsTarget: 'container',
        threshold: 1, 
        flipEffect: { slideShadows: true, limitRotation: true },
    });

    function toggleTheme() {
        document.body.classList.toggle("light");
        document.getElementById("theme-icon").textContent = 
            document.body.classList.contains("light") ? "light_mode" : "dark_mode";
    }

    function togglePopup(id, show) {
        document.getElementById(id).style.display = show ? "flex" : "none";
    }
</script>

</body>
</html>
